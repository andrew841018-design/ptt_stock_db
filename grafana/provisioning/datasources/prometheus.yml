# ============================================================
# Grafana Datasource Provisioning
# 自動註冊 Prometheus 為預設資料來源，指向 prometheus:9090
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
