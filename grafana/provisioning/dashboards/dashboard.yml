# ============================================================
# Grafana Dashboard Provisioning
# Grafana 啟動時自動載入 /var/lib/grafana/dashboards 下的 JSON
# ============================================================

apiVersion: 1

providers:
  - name: "PTT Stock Sentiment"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
