# ============================================================
# PTT Stock Sentiment Analysis - Docker Compose
# 服務：API / PostgreSQL / Redis / Airflow / Prometheus / Grafana
# ============================================================

services:

  # ── 應用服務 ──────────────────────────────────────────────

  # FastAPI REST API（對外提供情緒分析查詢）
  api:
    build: .
    container_name: stock_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PG_HOST: host.docker.internal  # 實際資料在 Homebrew PG
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 資料庫 ──────────────────────────────────────────────

  # PostgreSQL 16（僅供 Airflow metadata 使用；應用資料在 Homebrew PG）
  postgres:
    image: postgres:16
    container_name: stock_postgres
    mem_limit: 512m
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${PG_DBNAME:-ptt_stock}
      POSTGRES_USER: ${PG_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD:-pw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ADMIN_USER:-postgres} -d ${PG_DBNAME:-ptt_stock}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis（Cache-Aside 快取層，TTL 24 小時）
  redis:
    image: redis:7
    container_name: stock_redis
    ports:
      - "6380:6379"
    networks:
      - stock_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow 排程 ────────────────────────────────────────

  # Airflow Webserver（DAG 管理介面，port 8080）
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: stock_airflow:custom
    container_name: stock_airflow_webserver
    mem_limit: 512m
    command: airflow webserver
    ports:
      - "8081:8080"  # host 8080 occupied (Gemini daemon + ssh tunnel) → access via http://localhost:8081
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_ADMIN_USER:-postgres}:${PG_ADMIN_PASSWORD:-pw}@postgres:5432/${PG_DBNAME:-ptt_stock}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PG_HOST: host.docker.internal    # DAG tasks 連 Homebrew PG（實際資料）
      MONGO_HOST: host.docker.internal # DAG tasks 連 Homebrew MongoDB
      LINE_BOT_DIR: /opt/line_bot
      PTT_LOGS_DIR: /opt/airflow/etl_logs
      PTT_HEALTH_STATE_FILE: /opt/airflow/state/ptt_pipeline_health_state.json
      HOST_DISK_PATH: /host_root/Users/andrew  # virtiofs 在此路徑才正確 statvfs Mac 主碟
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"  # etl_dag top-level 重 import (torch/pandas/mlflow)，預設 30s 不夠
    env_file: .env
    volumes:
      - airflow_data:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./dependent_code:/opt/airflow/dependent_code
      - ./scripts:/opt/airflow/scripts:ro
      - ./logs:/opt/airflow/etl_logs:ro
      - ../line_bot:/opt/line_bot:ro
      - /:/host_root:ro  # 監測 Mac host 磁碟空間（health DAG 用）
      - ~/.aws:/home/airflow/.aws:ro  # backup task 用 AWS credentials
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - stock_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Airflow Scheduler（定時觸發 DAG）
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: stock_airflow:custom
    container_name: stock_airflow_scheduler
    mem_limit: 4g
    cpus: "1.5"
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_ADMIN_USER:-postgres}:${PG_ADMIN_PASSWORD:-pw}@postgres:5432/${PG_DBNAME:-ptt_stock}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PG_HOST: host.docker.internal    # DAG tasks 連 Homebrew PG（實際資料）
      MONGO_HOST: host.docker.internal # DAG tasks 連 Homebrew MongoDB
      LINE_BOT_DIR: /opt/line_bot
      PTT_LOGS_DIR: /opt/airflow/etl_logs
      PTT_HEALTH_STATE_FILE: /opt/airflow/state/ptt_pipeline_health_state.json
      HOST_DISK_PATH: /host_root/Users/andrew  # virtiofs 在此路徑才正確 statvfs Mac 主碟
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"  # etl_dag top-level 重 import (torch/pandas/mlflow)，預設 30s 不夠
    env_file: .env
    volumes:
      - airflow_data:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./dependent_code:/opt/airflow/dependent_code
      - ./scripts:/opt/airflow/scripts:ro
      - ./logs:/opt/airflow/etl_logs:ro
      - ../line_bot:/opt/line_bot:ro
      - /:/host_root:ro  # 監測 Mac host 磁碟空間（health DAG 用）
      - ~/.aws:/home/airflow/.aws:ro  # backup task 用 AWS credentials
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - stock_net
    restart: unless-stopped

  # Airflow 初始化（一次性：建表 + 建立 admin 帳號）
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: stock_airflow:custom
    container_name: stock_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_ADMIN_USER:-postgres}:${PG_ADMIN_PASSWORD:-pw}@postgres:5432/${PG_DBNAME:-ptt_stock}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PG_HOST: host.docker.internal
      MONGO_HOST: host.docker.internal
    volumes:
      - airflow_data:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./dependent_code:/opt/airflow/dependent_code
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock_net
    restart: "no"

  # ── 監控 ────────────────────────────────────────────────

  # Prometheus（指標收集，抓取 FastAPI /metrics endpoint）
  prometheus:
    image: prom/prometheus:latest
    container_name: stock_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    networks:
      - stock_net
    restart: unless-stopped

  # Grafana（視覺化儀表板，連接 Prometheus 資料源）
  grafana:
    image: grafana/grafana:latest
    container_name: stock_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - stock_net
    restart: unless-stopped

# ── 持久化 Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
  grafana_data:
  airflow_data:

# ── 網路 ────────────────────────────────────────────────────
networks:
  stock_net:
    driver: bridge
