name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r dependent_code/require_lib.txt

      - name: Run tests
        run: |
          pytest test_code/test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/ptt_stock_db
            source venv/bin/activate
            git pull
            kill $(lsof -t -i:8000) 2>/dev/null
            kill $(lsof -t -i:8501) 2>/dev/null
            nohup uvicorn api:app --host 0.0.0.0 --port 8000 &
            nohup streamlit run visualization.py --server.port 8501 --server.address 0.0.0.0 &
