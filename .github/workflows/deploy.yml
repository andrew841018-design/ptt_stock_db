name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r dependent_code/requirements.txt

      - name: Run tests
        run: |
          pytest dependent_code/test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/ptt_stock_db
            # 強制 reset 到 origin/main，避免 divergent history 卡住
            git fetch origin
            git reset --hard origin/main
            # 不能用 pkill -f「uvicorn」因為 drone-ssh 的 shell argv 含腳本全文，
            # pkill -f 會匹配自己導致 SIGTERM 143。改用 lsof -ti 依 port 找 PID。
            lsof -ti tcp:8000 2>/dev/null | xargs -r kill 2>/dev/null || true
            lsof -ti tcp:8501 2>/dev/null | xargs -r kill 2>/dev/null || true
            sleep 2
            # deploy script 寫在 EC2 上，SSH session 只負責觸發，服務 fd 全部重導向，
            # 不會被 SSH session 結束連帶殺掉
            cat > /home/ubuntu/start_services.sh <<'EOS'
            #!/bin/bash
            cd /home/ubuntu/ptt_stock_db/dependent_code
            set -a && source ../.env && set +a
            /home/ubuntu/venv/bin/uvicorn api:app --host 0.0.0.0 --port 8000 > /home/ubuntu/api.log 2>&1 &
            # --server.fileWatcherType none：關閉 hot-reload watcher。production 不需要，
            # 留著它會在啟動時掃描 transformers 整個 module tree → idle 就吃 1.2 GB。
            /home/ubuntu/venv/bin/streamlit run visualization.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --server.fileWatcherType none > /home/ubuntu/streamlit.log 2>&1 &
            EOS
            chmod +x /home/ubuntu/start_services.sh
            setsid /home/ubuntu/start_services.sh < /dev/null > /dev/null 2>&1 &
            sleep 3
            exit 0

      - name: Health check
        run: |
          sleep 15
          curl -fsS --max-time 10 http://${{ secrets.EC2_IP }}:8000/health
          curl -fsS --max-time 10 -o /dev/null http://${{ secrets.EC2_IP }}:8501/
