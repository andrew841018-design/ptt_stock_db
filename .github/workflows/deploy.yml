name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r dependent_code/requirements.txt

      - name: Run tests
        run: |
          pytest dependent_code/test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/ptt_stock_db
            source venv/bin/activate
            git pull
            pkill -f "uvicorn api:app" || true
            pkill -f "streamlit run visualization" || true
            # 1代表stdout, 2代表stderr,>代表重導向
            # 當>前面沒東西時，預設為1
            # >/dev/null 2>&1 & => 輸出導向空白(null)，錯誤導向輸出導向空白(null)
            # 簡單講=>都不印出
            cd /home/ubuntu/ptt_stock_db/dependent_code && nohup uvicorn api:app --host 0.0.0.0 --port 8000 > /dev/null 2>&1 &
            cd /home/ubuntu/ptt_stock_db && nohup streamlit run dependent_code/visualization.py --server.port 8501 --server.address 0.0.0.0 > /dev/null 2>&1 &
