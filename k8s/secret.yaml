# =============================================================================
# secret.yaml ── 【模板 / 文件用途】
# -----------------------------------------------------------------------------
# ⚠️ 不要直接 `kubectl apply -f secret.yaml`！裡面全是 placeholder。
#
# 部署真密碼請跑：
#   ./scripts/apply_k8s_secrets.sh
#   # 或：
#   python dependent_code/cli.py k8s-apply-secrets
#
# 那隻 script 會從 .env 讀真密碼 → `kubectl create secret ... | kubectl apply`
# 做 idempotent upsert，base64 編碼由 kubectl 自動處理。
#
# 本檔案保留在 repo 的目的：
#   1. 文件作用 ── 新人一看就知道需要哪些 secret keys
#   2. 提供 schema 給 K8s 工具（IntelliSense / lint）
#
# Secret 在 K8s 內只是 base64 編碼（非加密），正式環境應搭配
# Sealed Secrets 或 External Secrets Operator 做真正的加密管理。
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: stock-sentiment-secret
  namespace: stock-sentiment
  labels:
    app: stock-sentiment
# Opaque = 通用 Secret 類型（key-value 格式，base64 編碼）
type: Opaque
data:
  # PostgreSQL 管理員密碼（schema.py / dw_schema.py DDL 用）
  # 請替換：echo -n "your-pg-password" | base64
  PG_PASSWORD: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24="

  # PostgreSQL API 唯讀帳號密碼（FastAPI SELECT only）
  # 請替換：echo -n "your-api-password" | base64
  PG_API_PASSWORD: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24="

  # JWT 簽名金鑰（auth.py 用於產生和驗證 token）
  # 請替換：echo -n "your-jwt-secret" | base64
  JWT_SECRET_KEY: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24="

  # PII 雜湊鹽值（pii_masking.py 用於 author hash 化）
  # 請替換：echo -n "your-pii-salt" | base64
  PII_HASH_SALT: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24="
